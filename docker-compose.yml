version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://root:spacex_password@mysql:3306/spacex_ipo
    depends_on:
      - mysql
    networks:
      - spacex-network

  mysql:
    image: mysql:8.0-alpine
    environment:
      MYSQL_ROOT_PASSWORD: spacex_password
      MYSQL_DATABASE: spacex_ipo
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - spacex-network

volumes:
  mysql_data:

networks:
  spacex-network:
    driver: bridge
